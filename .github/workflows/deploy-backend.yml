name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
      - "scripts/deploy-backend-server.sh"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      RELEASE_ARCHIVE: tournament-backend-release.tgz
      REMOTE_ARCHIVE: /tmp/tournament-backend-release.tgz
      DEPLOY_PATH: /opt/tournament/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend
        run: |
          cd backend
          npm ci --include=dev
          npm run build

      - name: Pack release archive
        run: |
          mkdir -p /tmp/backend-release
          cp backend/package.json /tmp/backend-release/
          cp backend/package-lock.json /tmp/backend-release/
          cp -R backend/dist /tmp/backend-release/dist
          if [[ -d backend/prisma ]]; then
            cp -R backend/prisma /tmp/backend-release/prisma
          fi
          tar -czf "/tmp/$RELEASE_ARCHIVE" -C /tmp/backend-release .
          cp "/tmp/$RELEASE_ARCHIVE" "./$RELEASE_ARCHIVE"

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: ${{ env.RELEASE_ARCHIVE }}
          target: /tmp/

      - name: Run deploy script on server
        id: remote_deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: DEPLOY_PATH,REMOTE_ARCHIVE
          script: |
            set -euo pipefail
            APP_ROOT="${DEPLOY_PATH}"
            RELEASES_DIR="$APP_ROOT/releases"
            SHARED_DIR="$APP_ROOT/shared"
            CURRENT_LINK="$APP_ROOT/current"
            PROCESS_NAME="api"
            HEALTHCHECK_URL="http://127.0.0.1:4000/api"
            STAMP="$(date +%Y%m%d%H%M%S)"
            NEW_RELEASE_DIR="$RELEASES_DIR/$STAMP"
            PREVIOUS_RELEASE_DIR="$(readlink -f "$CURRENT_LINK" 2>/dev/null || true)"

            mkdir -p "$RELEASES_DIR" "$SHARED_DIR"
            if [[ ! -f "$SHARED_DIR/.env" ]]; then
              echo "Missing $SHARED_DIR/.env" >&2
              exit 1
            fi

            mkdir -p "$NEW_RELEASE_DIR"
            tar -xzf "$REMOTE_ARCHIVE" -C "$NEW_RELEASE_DIR"
            ln -sfn "$SHARED_DIR/.env" "$NEW_RELEASE_DIR/.env"

            cd "$NEW_RELEASE_DIR"
            npm ci --omit=dev
            if [[ -f "prisma/schema.prisma" ]]; then
              npx prisma migrate deploy
            fi

            ln -sfn "$NEW_RELEASE_DIR" "$CURRENT_LINK"
            cd "$CURRENT_LINK"
            if pm2 describe "$PROCESS_NAME" >/dev/null 2>&1; then
              pm2 delete "$PROCESS_NAME"
            fi
            pm2 start dist/main.js --name "$PROCESS_NAME" --cwd "$CURRENT_LINK"

            # Wait for Nest to bind :4000 (PM2 "online" is not enough).
            for _ in $(seq 1 90); do
              if ss -ltn 2>/dev/null | grep -qE ":4000\\s"; then
                break
              fi
              sleep 2
            done

            HEALTH_OK=0
            for _ in $(seq 1 60); do
              if curl -fsS "$HEALTHCHECK_URL" >/dev/null; then
                HEALTH_OK=1
                break
              fi
              sleep 3
            done

            if [[ "$HEALTH_OK" -ne 1 ]]; then
              echo "Backend healthcheck failed after deploy: $HEALTHCHECK_URL" >&2
              echo "Diagnostic: listeners on backend port" >&2
              ss -ltnp | grep ':4000' || true
              echo "Diagnostic: PM2 backend logs (last 80 lines)" >&2
              pm2 logs "$PROCESS_NAME" --lines 80 --nostream || true
              if [[ -n "$PREVIOUS_RELEASE_DIR" && -d "$PREVIOUS_RELEASE_DIR" ]]; then
                echo "Rolling back to previous release: $PREVIOUS_RELEASE_DIR" >&2
                ln -sfn "$PREVIOUS_RELEASE_DIR" "$CURRENT_LINK"
                cd "$CURRENT_LINK"
                if pm2 describe "$PROCESS_NAME" >/dev/null 2>&1; then
                  pm2 delete "$PROCESS_NAME"
                fi
                pm2 start dist/main.js --name "$PROCESS_NAME" --cwd "$CURRENT_LINK"
              fi
              ACTIVE_RELEASE_DIR="$(readlink -f "$CURRENT_LINK" 2>/dev/null || echo "unknown")"
              echo "## Backend deploy status (remote)" >&2
              echo "- Result: failed" >&2
              echo "- Rollback: performed" >&2
              echo "- Active release: ${ACTIVE_RELEASE_DIR}" >&2
              exit 1
            fi

            ACTIVE_RELEASE_DIR="$(readlink -f "$CURRENT_LINK" 2>/dev/null || echo "unknown")"
            echo "## Backend deploy status (remote)" >&2
            echo "- Result: success" >&2
            echo "- Rollback: not needed" >&2
            echo "- Active release: ${ACTIVE_RELEASE_DIR}" >&2

            pm2 save
            ls -1dt "$RELEASES_DIR"/* 2>/dev/null | sed -e '1,5d' | xargs -r rm -rf

      - name: Write deploy summary
        if: always()
        run: |
          if [ "${{ steps.remote_deploy.outcome }}" = "success" ]; then
            {
              echo "## Backend deploy"
              echo ""
              echo "- Result: success"
              echo "- Note: \`Active release\` and diagnostics are in the SSH step log."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Backend deploy"
              echo ""
              echo "- Result: failed"
              echo "- Note: see SSH step log for rollback and diagnostics."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
