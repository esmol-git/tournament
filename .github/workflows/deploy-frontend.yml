name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      RELEASE_ARCHIVE: tournament-frontend-release.tgz
      REMOTE_ARCHIVE: /tmp/tournament-frontend-release.tgz
      DEPLOY_PATH: /opt/tournament/frontend
      FRONTEND_PORT: "3000"
      FRONTEND_HOST: "127.0.0.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        env:
          # Nuxt 4 + Nitro: при ~4 ГБ heap сборка падает (FATAL OOM). GitHub linux runner ~7 ГБ RAM.
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          cd frontend
          npm ci --include=dev
          export NUXT_PUBLIC_API_BASE="${NUXT_PUBLIC_API_BASE:-https://api.tournament-platform.ru}"
          npm run build

      - name: Pack release archive
        run: |
          mkdir -p /tmp/frontend-release
          cp frontend/package.json /tmp/frontend-release/
          cp frontend/package-lock.json /tmp/frontend-release/
          cp -R frontend/.output /tmp/frontend-release/.output
          tar -czf "/tmp/$RELEASE_ARCHIVE" -C /tmp/frontend-release .
          cp "/tmp/$RELEASE_ARCHIVE" "./$RELEASE_ARCHIVE"

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: ${{ env.RELEASE_ARCHIVE }}
          target: /tmp/

      - name: Deploy release on server
        id: remote_deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: DEPLOY_PATH,REMOTE_ARCHIVE,FRONTEND_PORT,FRONTEND_HOST
          script: |
            set -euo pipefail
            APP_ROOT="${DEPLOY_PATH}"
            RELEASES_DIR="$APP_ROOT/releases"
            SHARED_DIR="$APP_ROOT/shared"
            CURRENT_LINK="$APP_ROOT/current"
            PROCESS_NAME="frontend"
            HEALTHCHECK_URL="http://${FRONTEND_HOST}:${FRONTEND_PORT}/"
            STAMP="$(date +%Y%m%d%H%M%S)"
            NEW_RELEASE_DIR="$RELEASES_DIR/$STAMP"
            PREVIOUS_RELEASE_DIR="$(readlink -f "$CURRENT_LINK" 2>/dev/null || true)"

            mkdir -p "$RELEASES_DIR" "$SHARED_DIR"
            if [[ ! -f "$SHARED_DIR/.env" ]]; then
              echo "Missing $SHARED_DIR/.env" >&2
              exit 1
            fi

            mkdir -p "$NEW_RELEASE_DIR"
            tar -xzf "$REMOTE_ARCHIVE" -C "$NEW_RELEASE_DIR"
            ln -sfn "$SHARED_DIR/.env" "$NEW_RELEASE_DIR/.env"
            ln -sfn "$NEW_RELEASE_DIR" "$CURRENT_LINK"

            if pm2 describe "$PROCESS_NAME" >/dev/null 2>&1; then
              pm2 delete "$PROCESS_NAME"
            fi

            set -a
            # shellcheck disable=SC1090
            source "$SHARED_DIR/.env"
            set +a
            HOST="$FRONTEND_HOST" PORT="$FRONTEND_PORT" pm2 start "$CURRENT_LINK/.output/server/index.mjs" --name "$PROCESS_NAME" --cwd "$CURRENT_LINK"

            # Wait until the TCP port is listening (Nuxt binds after process start).
            for _ in $(seq 1 90); do
              if ss -ltn 2>/dev/null | grep -qE ":${FRONTEND_PORT}\\s"; then
                break
              fi
              sleep 2
            done

            HEALTH_OK=0
            # After bind, HTTP can still warm up; allow up to ~180s of curl retries.
            for _ in $(seq 1 60); do
              if curl -fsS "$HEALTHCHECK_URL" >/dev/null; then
                HEALTH_OK=1
                break
              fi
              sleep 3
            done

            if [[ "$HEALTH_OK" -ne 1 ]]; then
              echo "Frontend healthcheck failed after deploy: $HEALTHCHECK_URL" >&2
              echo "Diagnostic: listeners on frontend port" >&2
              ss -ltnp | grep ":${FRONTEND_PORT}" || true
              echo "Diagnostic: PM2 frontend logs (last 80 lines)" >&2
              pm2 logs "$PROCESS_NAME" --lines 80 --nostream || true
              if [[ -n "$PREVIOUS_RELEASE_DIR" && -d "$PREVIOUS_RELEASE_DIR" ]]; then
                echo "Rolling back to previous release: $PREVIOUS_RELEASE_DIR" >&2
                ln -sfn "$PREVIOUS_RELEASE_DIR" "$CURRENT_LINK"
                if pm2 describe "$PROCESS_NAME" >/dev/null 2>&1; then
                  pm2 delete "$PROCESS_NAME"
                fi
                HOST="$FRONTEND_HOST" PORT="$FRONTEND_PORT" pm2 start "$CURRENT_LINK/.output/server/index.mjs" --name "$PROCESS_NAME" --cwd "$CURRENT_LINK"
              fi
              ACTIVE_RELEASE_DIR="$(readlink -f "$CURRENT_LINK" 2>/dev/null || echo "unknown")"
              echo "## Frontend deploy status (remote)" >&2
              echo "- Result: failed" >&2
              echo "- Rollback: performed" >&2
              echo "- Active release: ${ACTIVE_RELEASE_DIR}" >&2
              exit 1
            fi

            ACTIVE_RELEASE_DIR="$(readlink -f "$CURRENT_LINK" 2>/dev/null || echo "unknown")"
            echo "## Frontend deploy status (remote)" >&2
            echo "- Result: success" >&2
            echo "- Rollback: not needed" >&2
            echo "- Active release: ${ACTIVE_RELEASE_DIR}" >&2

            pm2 save
            ls -1dt "$RELEASES_DIR"/* 2>/dev/null | sed -e '1,5d' | xargs -r rm -rf

      - name: Write deploy summary
        if: always()
        run: |
          if [ "${{ steps.remote_deploy.outcome }}" = "success" ]; then
            {
              echo "## Frontend deploy"
              echo ""
              echo "- Result: success"
              echo "- Note: \`Active release\` and diagnostics are in the SSH step log."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Frontend deploy"
              echo ""
              echo "- Result: failed"
              echo "- Note: see SSH step log for rollback and diagnostics."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
